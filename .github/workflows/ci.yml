name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate:
    name: Remove retired Tend selector
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove retired Tend version field
        shell: bash
        run: |
          set -euo pipefail
          sed -i '/^[[:space:]]*"version":[[:space:]]*[0-9][0-9]*,[[:space:]]*$/d' .tend.json
          if git diff --quiet -- .tend.json; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .tend.json
          git commit -m "chore: remove retired Tend version selector"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
