name: Update cleanup lock

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - cleanup/tend-v2-aggregate

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Update and format
        run: |
          nix flake update
          nix develop --command nixfmt flake.nix modules/package.nix modules/home/dev-tools.nix packages/dev-tools.nix
      - name: Commit generated graph
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add flake.lock flake.nix modules packages
          if ! git diff --cached --quiet; then
            git commit -m "chore: update package lock graph"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
